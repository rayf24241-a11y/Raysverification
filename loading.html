<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Making Website Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg">
    <div class="gradient gradient-1"></div>
    <div class="gradient gradient-2"></div>
    <div class="grid"></div>
    <div class="stars"></div>
  </div>

  <main class="page">
    <section class="card loading-card">
      <div class="loading-spinner"></div>
      <h1 class="loading-title">Making Website Code</h1>
      <p class="subtext loading-subtext">
        Please wait. We are creating the code you will give back to the bot in <b>/linkverify</b>.
      </p>

      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>
    </section>
  </main>

  <script>
    setTimeout(() => {
      window.location.href = "game-code.html";
    }, 5000);
  </script>
</body>
</html>
