<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading Your Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg">
    <div class="gradient gradient-1"></div>
    <div class="gradient gradient-2"></div>
    <div class="grid"></div>
    <div class="stars"></div>
  </div>

  <main class="page">
    <section class="card loading-card">
      <div class="loading-spinner"></div>
      <h1 class="loading-title">Loading Your Code</h1>
      <p class="subtext loading-subtext">Please wait while we make your code.</p>

      <div class="loading-bar">
        <div class="loading-bar-fill"></div>
      </div>
    </section>
  </main>

  <script>
    const waitTime = Math.floor(Math.random() * 3000) + 3000;
    setTimeout(() => {
      window.location.href = "game-code.html";
    }, waitTime);
  </script>
</body>
</html>
