<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg">
    <div class="gradient gradient-1"></div>
    <div class="gradient gradient-2"></div>
    <div class="grid"></div>
    <div class="stars"></div>
  </div>

  <main class="page">
    <section class="card pick-card">
      <div class="top-row center-top">
        <div class="badge">Home</div>
      </div>

      <h1 class="center-title">Pick A Mod Type</h1>
      <p class="subtext center-subtext">Choose what section you want.</p>

      <div class="pick-grid">
        <button class="pick-btn" onclick="goToSteam()">Steam</button>
        <button class="pick-btn" onclick="goToVr()">VR</button>
      </div>

      <div id="pickStatus" class="result"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
