<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Give This Code To The Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg">
    <div class="gradient gradient-1"></div>
    <div class="gradient gradient-2"></div>
    <div class="grid"></div>
    <div class="stars"></div>
  </div>

  <main class="page">
    <section class="card code-page-card">
      <div class="top-row center-top">
        <div class="badge">Step 2</div>
      </div>

      <h1 class="center-title">Give This Code To The Bot</h1>
      <p class="subtext center-subtext">
        Copy this website code, then go to Discord and use <b>/linkverify</b> with this code.
      </p>

      <div class="code-center-wrap">
        <label for="gameCodeOutput" class="input-label center-label">Website Link Code</label>
        <input
          id="gameCodeOutput"
          class="game-code-output center-code"
          type="text"
          readonly
          placeholder="Your website code will appear here"
        />
        <button class="copy-btn big-copy-btn" onclick="copyCode()">Copy Code</button>
        <div id="copyMsg" class="copy-msg"></div>
      </div>

      <div class="next-step-box">
        <h2 class="next-step-title">Get The Next Bot Code</h2>
        <p class="next-step-subtext">
          After the bot gives you the next code, paste it below.
        </p>

        <div class="input-area">
          <label for="nextBotCodeInput" class="input-label center-label">Next Bot Code</label>
          <div class="input-shell">
            <input
              id="nextBotCodeInput"
              type="text"
              placeholder="Paste the next bot code here"
              maxlength="50"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>

        <button class="main-btn" onclick="submitNextBotCode()">
          <span class="btn-text">Submit Next Bot Code</span>
          <span class="btn-glow"></span>
        </button>

        <div id="finalResult" class="result"></div>

        <div id="finalThingBox" class="final-thing-box hidden">
          <div class="final-thing-title">All Set</div>
          <div class="final-thing-text" id="finalThingText">
            Codes correct. Discord user linked. Your actual thing is ready.
          </div>
          <div class="final-thing-code" id="finalThingCode"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    const savedCode = localStorage.getItem("generatedGameCode") || "";
    document.getElementById("gameCodeOutput").value = savedCode;
  </script>
</body>
</html>
