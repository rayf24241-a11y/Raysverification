<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid"></div>
    <div class="noise"></div>
  </div>

  <main class="page">
    <section class="card">
      <div class="badge">Verification Portal</div>

      <h1>Verify Code?</h1>
      <p class="subtext">Enter the code you got from Discord to continue.</p>

      <div class="input-wrap">
        <input
          id="codeInput"
          type="text"
          placeholder="Enter your code"
          maxlength="30"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button id="verifyBtn" class="main-btn" onclick="verifyCode()">
        <span class="btn-text">Verify</span>
        <span class="btn-loader hidden"></span>
      </button>

      <p id="result" class="result"></p>

      <div id="successBox" class="success-box hidden">
        <div class="success-icon">✓</div>
        <div>
          <div class="success-title">Verified</div>
          <div class="success-subtitle">Your code was accepted successfully.</div>
        </div>
      </div>

      <button class="how-btn" onclick="goToHowPage()">How to get</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
