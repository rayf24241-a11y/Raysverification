<!DOCTYPE html>
<html>
<head>
  <title>Verify Code</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid"></div>
    <div class="noise"></div>
  </div>

  <main class="page">
    <section class="card">
      <div class="badge">Verification Portal</div>

      <h1>Verify Code?</h1>
      <p class="subtext">Enter the code you got from Discord to continue.</p>

      <div class="input-wrap">
        <input
          id="codeInput"
          type="text"
          placeholder="Enter your code"
          maxlength="30"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button id="verifyBtn" class="main-btn" onclick="verifyCode()">
        <span class="btn-text">Verify</span>
        <span class="btn-loader hidden"></span>
      </button>

      <p id="result" class="result"></p>

      <div id="successBox" class="success-box hidden">
        <div class="success-icon">✓</div>
        <div>
          <div class="success-title">Verified</div>
          <div class="success-subtitle">Your code was accepted successfully.</div>
        </div>
      </div>

      <div id="gameCodeBox" class="game-code-box hidden">
        <div class="game-code-title">Please wait while we make your game code.</div>
        <div class="game-code-subtitle">Your code box will appear below.</div>

        <div class="game-code-wrap">
          <input
            id="gameCodeOutput"
            class="game-code-input"
            type="text"
            value=""
            readonly
            placeholder=""
          />
          <button id="copyBtn" class="copy-btn" onclick="copyGameCode()">Copy</button>
        </div>

        <p id="copyResult" class="copy-result"></p>
      </div>

      <button class="how-btn" onclick="goToHowPage()">How to get</button>
    </section>
  </main>

<script src="script.js"></script>

</body>
</html>
