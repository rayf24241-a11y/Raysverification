<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-glow"></div>

  <main class="page">
    <section class="card">
      <div class="top-badge">Verification</div>

      <h1>Verify Code?</h1>
      <p class="subtext">Enter the code you got from Discord to continue.</p>

      <div class="input-wrap">
        <input id="codeInput" type="text" placeholder="Enter your code" maxlength="30" />
      </div>

      <button class="main-btn" onclick="verifyCode()">Verify</button>

      <p id="result" class="result"></p>

      <button class="how-btn" onclick="goToHowPage()">How to get</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
