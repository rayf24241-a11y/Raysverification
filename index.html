<!DOCTYPE html>
<html>
<head>
  <title>Verify Code</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div class="card">

    <div class="badge">Verification</div>

    <h1>Verify Code?</h1>
    <p>Enter the code you got from Discord to continue.</p>

    <input id="codeInput" type="text" placeholder="ENTER CODE">

    <button id="verifyBtn" class="main-btn" onclick="verifyCode()">Verify</button>

    <div id="result" class="result"></div>

    <!-- SUCCESS MESSAGE -->
    <div id="successBox" class="hidden">
      <p class="wait-text">Please wait while we make your game code...</p>
    </div>

    <!-- GAME CODE BOX -->
    <div id="gameCodeBox" class="hidden">
      <input id="gameCodeOutput" readonly placeholder="Your game code will appear here">
      <button onclick="copyCode()" class="copy-btn">Copy</button>
    </div>

    <button class="how-btn" onclick="goToHowPage()">How to get</button>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
